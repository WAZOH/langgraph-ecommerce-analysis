services:
  market-agent:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env # charge les clés API depuis le fichier .env local
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
